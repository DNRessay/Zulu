name: Zulu Bible Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'   # runs every day at 2 AM UTC

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils tesseract-ocr

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python pipeline.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Report Neon DB size
        if: always()                          # ← already had this, good
        run: |
          python -c "import db; print(f'Neon size: {db.get_db_size_mb():.1f} MB / {db.NEON_LIMIT_MB} MB')" >> "$GITHUB_STEP_SUMMARY"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload JSONL artifact
        if: always()                          # ← ADD THIS so it uploads even on timeout
        uses: actions/upload-artifact@v4
        with:
          name: zu_en_bible_jsonl
          path: data/zu_en_bible.jsonl
          retention-days: 14
